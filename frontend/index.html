<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfarer: Echoes of the Void</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ui.css">
  <link rel="stylesheet" href="/css/galaxy.css">
  <link rel="stylesheet" href="/css/system.css">
  <link rel="stylesheet" href="/css/surface.css">
  <script type="application/ld+json" id="game-state">{}</script>
</head>
<body>
  <div id="app">

    <!-- Main Menu -->
    <section id="screen-menu" class="screen active" aria-label="Main menu">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2rem;">
        <div style="text-align:center;">
          <h1 style="font-size:2.5rem;color:var(--color-star);letter-spacing:0.05em;">STARFARER</h1>
          <p style="color:var(--color-text-dim);font-size:1rem;">Echoes of the Void</p>
        </div>
        <div style="text-align:center;color:var(--color-text-dim);font-size:0.8rem;">
          The universe is infinite. Your fuel is not.
        </div>
        <div style="display:flex;flex-direction:column;gap:1rem;align-items:center;min-width:300px;">
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <label for="new-game-seed" style="color:var(--color-text-dim);font-size:0.8rem;">Seed:</label>
            <input type="number" id="new-game-seed" placeholder="42" style="width:100px;background:rgba(255,255,255,0.05);border:1px solid var(--color-border);color:var(--color-text);padding:0.3rem 0.5rem;border-radius:var(--radius);font-family:var(--font-mono);" aria-label="Universe seed">
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <label for="new-game-ship-name" style="color:var(--color-text-dim);font-size:0.8rem;">Ship:</label>
            <input type="text" id="new-game-ship-name" placeholder="Serendipity" style="width:150px;background:rgba(255,255,255,0.05);border:1px solid var(--color-border);color:var(--color-text);padding:0.3rem 0.5rem;border-radius:var(--radius);font-family:var(--font-mono);" aria-label="Ship name">
          </div>
          <button data-action="new-game" class="ui-button" style="width:100%;justify-content:center;" aria-label="Start a new game">New Game</button>
          <button data-action="continue-game" class="ui-button" style="width:100%;justify-content:center;opacity:0.7;" aria-label="Continue saved game">Continue</button>
        </div>
        <div style="text-align:center;color:var(--color-text-dim);font-size:0.7rem;">
          v0.1.0 — Built by AI, for AI
        </div>
      </div>
    </section>

    <!-- Galaxy Map -->
    <section id="screen-galaxy" class="screen" aria-label="Galaxy map">
      <canvas id="galaxy-canvas" aria-label="Galaxy map canvas"></canvas>
      <div class="galaxy-hud">
        <div class="ui-panel" id="galaxy-system-info">
          <div class="ui-panel-title">System Info</div>
          <div style="color:var(--color-text-dim);">Click a star to select it</div>
        </div>
      </div>
      <div class="galaxy-legend">
        <span><span class="legend-dot visited"></span> Visited</span>
        <span><span class="legend-dot unvisited"></span> Unexplored</span>
        <span><span class="legend-dot current"></span> Current</span>
      </div>
      <div class="galaxy-controls">
        <button data-action="show-system" class="ui-button" style="font-size:0.8rem;">System View</button>
      </div>
    </section>

    <!-- System View -->
    <section id="screen-system" class="screen" aria-label="System view">
      <div id="system-content" style="flex:1;"></div>
    </section>

    <!-- Surface View -->
    <section id="screen-surface" class="screen" aria-label="Surface exploration">
      <div id="surface-content" style="flex:1;"></div>
    </section>

    <!-- Ship Log -->
    <section id="screen-log" class="screen" aria-label="Ship log">
      <div style="padding:1rem;overflow-y:auto;flex:1;">
        <h2 style="color:var(--color-cyan);margin-bottom:1rem;">Ship Log</h2>
        <div id="log-content"></div>
        <button data-action="show-system" class="ui-button" style="margin-top:1rem;">Back</button>
      </div>
    </section>

    <!-- Ship Panel (persistent) -->
    <div id="ship-panel"></div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/galaxy.js"></script>
  <script src="/js/system.js"></script>
  <script src="/js/ship.js"></script>
  <script src="/js/events.js"></script>
  <script src="/js/log.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
